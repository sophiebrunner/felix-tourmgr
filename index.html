<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Sophie Brunner" />
    <meta
      name="description"
      content="Portfolio website of the tourmanager Felix Meischter, currently working for Milow."
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:100,100italic,300,300italic,regular,italic,500,500italic,700,700italic,900,900italic"
      rel="stylesheet"
    />
    <title>Felix Meischter | Tourmanager</title>
  </head>
  <body>
    <header>
      <nav role="navigation">
        <div class="menu-toggle">
          <input type="checkbox" class="hidden-checkbox" />
          <span class="burger-icon"></span><span class="burger-icon"></span
          ><span class="burger-icon"></span>
          <ul class="nav-menu">
            <li class="nav-menu__entry">
              <a href="#home" class="nav-menu__link">Home</a>
            </li>
            <li class="nav-menu__entry">
              <a href="#portfolio" class="nav-menu__link">Portfolio</a>
            </li>
            <li class="nav-menu__entry">
              <a href="#contact" class="nav-menu__link">Contact</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <article class="hero" id="home">
        <div class="hero__img-container">
          <img
            src="kfs18-0530-festivalimpressionen-007.jpg"
            alt="Portrait of
        Felix Meischter"
            class="hero__img"
          />
        </div>
        <div class="bio-container">
          <article class="bio">
            <h1 class="bio__title">FELIX MEISCHTER</h1>
            <p class="bio__text">Tourmanager</p>
            <div class="bio__button-container">
              <button class="bio__button bio__button--contact">Book me</button>
              <button class="bio__button bio__button--portfolio">
                About me
              </button>
            </div>
          </article>
        </div>
      </article>
      <article id="portfolio">
        <h2>Experiences</h2>
        <div class="experiences__img-container">
          <img src="Milow.jpg" alt="" class="experiences__img" />
        </div>
      </article>
      <article id="contact"><h2>Hi - schreib mir!</h2></article>
    </main>
    <footer>
      <p class="copyright">&copy; Copyright 2022</p>
      <p class="copyright">
        Built with &#x2661; by
        <a href="http://github.com/sophiebrunner">Sophie Brunner</a>
      </p>
      <i class="scroll-up" id="scroll-up"
        ><img
          src="icons8-eingekreistes-rangabzeichen-oben-50.png"
          alt="Arrow up in a circle to show the user, that they can scroll to the top of the page."
          class="up-icon"
      /></i>
    </footer>
    <script src="script.js"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
